<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #0a0a0a;
    --ink: #fff;
    --accent: #ff1744;
    --font: 'Impact','Arial Black','Malgun Gothic',sans-serif;
    --shake-amp: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font);
    overflow: hidden;
    user-select: none;
    cursor: crosshair;
    transition: background 0.6s ease;
  }

  /* ============ 테마별 배경 ============ */
  body[data-theme="rage"] {
    --bg: #000;
    --ink: #fff; --accent: #ff1744;
    --font: 'Impact','Arial Black','Malgun Gothic',sans-serif;
    --shake-amp: 10px;
  }
  body[data-theme="curse"] {
    --bg: #0a0000;
    --ink: #d4c4c4; --accent: #8b0000;
    --font: 'Times New Roman','Batang',serif;
    --shake-amp: 4px;
  }
  body[data-theme="nuclear"] {
    --bg: #0a0a0a;
    --ink: #fff; --accent: #ffaa00;
    --font: 'Impact','Arial Black',sans-serif;
    --shake-amp: 14px;
  }
  body[data-theme="execute"] {
    --bg: #0a0000;
    --ink: #fff; --accent: #e60026;
    --font: 'Impact','Arial Black','Malgun Gothic',sans-serif;
    --shake-amp: 18px;
  }

  /* ============ 스테이지 ============ */
  #stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }
  #stage::before {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 0;
    transition: opacity 0.6s;
  }
  body[data-theme="rage"] #stage::before {
    background: repeating-linear-gradient(0deg, rgba(255,255,255,.02) 0 1px, transparent 1px 3px);
    mix-blend-mode: screen;
  }
  body[data-theme="curse"] #stage::before {
    background:
      radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,.85) 90%);
    animation: candleFlicker 4s infinite;
  }
  @keyframes candleFlicker {
    0%,100% { opacity: 1; }
    50% { opacity: 0.85; }
    52% { opacity: 0.6; }
    54% { opacity: 0.95; }
  }
  body[data-theme="nuclear"] #stage::before {
    background: repeating-radial-gradient(circle at 50% 50%, transparent 0 40px, rgba(255,170,0,.05) 40px 42px);
  }
  body[data-theme="execute"] #stage::before {
    background:
      repeating-linear-gradient(45deg, rgba(230,0,38,.06) 0 30px, transparent 30px 60px),
      radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,.85) 100%);
  }

  /* ============ 입력창 (덩그러니) ============ */
  #text {
    position: fixed;
    left: 50%;
    bottom: 40px;
    transform: translateX(-50%);
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,.25);
    color: rgba(255,255,255,.95);
    padding: 8px 4px;
    font-size: 15px;
    font-family: sans-serif;
    width: 360px;
    max-width: 80vw;
    outline: none;
    text-align: center;
    z-index: 100;
    letter-spacing: 0.5px;
  }
  #text::placeholder { color: rgba(255,255,255,.3); }
  #text:focus { border-bottom-color: rgba(255,255,255,.6); }

  /* ============ 카운터 (좌측 상단) ============ */
  #counter {
    position: fixed;
    top: 14px; left: 16px;
    font-size: 11px;
    color: rgba(255,255,255,.4);
    z-index: 100;
    font-family: sans-serif;
    pointer-events: none;
    letter-spacing: 0.5px;
  }

  /* ============ 테마 (우측 상단, 텍스트만) ============ */
  #themes {
    position: fixed;
    top: 14px; right: 16px;
    display: flex;
    gap: 14px;
    z-index: 100;
    font-family: sans-serif;
  }
  #themes button {
    background: none;
    border: none;
    color: rgba(255,255,255,.3);
    font-size: 11px;
    padding: 0;
    cursor: pointer;
    letter-spacing: 0.5px;
    font-family: inherit;
  }
  #themes button:hover { color: rgba(255,255,255,.8); }
  #themes button.active { color: rgba(255,255,255,1); }

  /* ============ 외침 텍스트 ============ */
  .shout {
    position: absolute;
    font-weight: 900;
    white-space: nowrap;
    pointer-events: none;
    text-transform: uppercase;
    letter-spacing: -2px;
    transform-origin: center;
    will-change: transform, opacity, filter;
    z-index: 10;
    font-family: var(--font);
  }

  /* RAGE - 글리치 폭발 */
  .shout.glitch {
    text-shadow:
      0 0 20px currentColor, 0 0 40px currentColor,
      3px 3px 0 #000, -3px -3px 0 #000;
    animation: explode var(--dur,2.5s) cubic-bezier(.1,.9,.2,1) forwards;
  }
  @keyframes explode {
    0% { transform: translate(-50%,-50%) scale(0) rotate(var(--rot,0deg)); opacity: 0; filter: blur(30px); }
    15% { transform: translate(-50%,-50%) scale(1.4) rotate(var(--rot,0deg)); opacity: 1; filter: blur(0); }
    30% { transform: translate(-50%,-50%) scale(1) rotate(var(--rot,0deg)); }
    100% {
      transform: translate(calc(-50% + var(--dx,0px)), calc(-50% + var(--dy,0px)))
        scale(var(--endscale,3)) rotate(calc(var(--rot,0deg) + var(--spin,180deg)));
      opacity: 0; filter: blur(10px);
    }
  }

  /* CURSE - 떨림 + 뒤집힘 */
  .shout.tremble {
    color: var(--accent);
    text-shadow:
      0 0 10px #8b0000, 0 0 30px #4a0000,
      2px 0 0 #2a0000, -2px 0 0 #2a0000;
    animation: tremble var(--dur,3s) steps(3) forwards;
  }
  @keyframes tremble {
    0% { transform: translate(-50%,-50%) scale(0.5) rotate(180deg); opacity: 0; filter: blur(15px); }
    10% { transform: translate(-50%,-50%) scale(1) rotate(0deg); opacity: 1; filter: blur(0); }
    20% { transform: translate(calc(-50% + 4px),-50%) scale(1) rotate(-1deg); }
    25% { transform: translate(calc(-50% - 4px),calc(-50% + 2px)) scale(1) rotate(1deg); }
    30% { transform: translate(calc(-50% + 3px),calc(-50% - 2px)) scale(1) rotate(-1deg); }
    35% { transform: translate(calc(-50% - 3px),-50%) scale(1) rotate(1deg); }
    50% { transform: translate(-50%,-50%) scale(1.05); opacity: 0.9; }
    100% { transform: translate(-50%,calc(-50% + 50px)) scale(0.9) rotate(180deg); opacity: 0; filter: blur(20px); }
  }

  /* NUCLEAR ENGULF - 작게 → 화면 꽉 채우고 → 넘쳐서 사라짐 */
  .shout.engulf {
    color: #fff;
    text-shadow:
      0 0 30px #ffaa00, 0 0 60px #ff4400, 0 0 120px #ff0000,
      6px 6px 0 #000, -6px -6px 0 #000;
    animation: engulf var(--dur,5s) cubic-bezier(.55,.05,.95,.4) forwards;
  }
  @keyframes engulf {
    0%   { transform: translate(-50%,-50%) scale(0.05); opacity: 0; filter: blur(0); }
    6%   { transform: translate(-50%,-50%) scale(0.1); opacity: 1; }
    50%  { transform: translate(-50%,-50%) scale(2); opacity: 1; }
    78%  { transform: translate(-50%,-50%) scale(7); opacity: 1; filter: blur(0); }
    92%  { transform: translate(-50%,-50%) scale(13); opacity: 1; filter: blur(0); }
    96%  { transform: translate(-50%,-50%) scale(14); opacity: 1; filter: blur(2px); }
    100% { transform: translate(-50%,-50%) scale(14.2); opacity: 0; filter: blur(0); }
  }

  /* EXECUTE - 처형장: 표적 등장 → 무기 휘둘러서 박살 */
  .shout.verdict {
    color: #fff;
    font-style: italic;
    text-shadow:
      0 0 12px #e60026, 0 0 30px #8b0000,
      4px 4px 0 #000, -4px -4px 0 #000;
    -webkit-text-stroke: 2px #e60026;
    animation: verdictLock var(--dur,1.5s) steps(8,end) forwards;
  }
  @keyframes verdictLock {
    0%   { transform: translate(-50%,-50%) scale(3) rotate(-8deg); opacity: 0; filter: blur(20px); }
    25%  { transform: translate(-50%,-50%) scale(1.2) rotate(2deg); opacity: 1; filter: blur(0); }
    35%  { transform: translate(calc(-50% + 6px),-50%) scale(1.15) rotate(-1deg); }
    45%  { transform: translate(calc(-50% - 6px),-50%) scale(1.15) rotate(1deg); }
    55%  { transform: translate(-50%,-50%) scale(1.15) rotate(0); }
    100% { transform: translate(-50%,-50%) scale(1.15) rotate(0); opacity: 1; }
  }

  /* 무기 (이모지) — 화면 밖에서 회전하며 날아와 중앙을 강타 */
  .weapon {
    position: absolute;
    pointer-events: none;
    z-index: 25;
    font-size: 320px;
    line-height: 1;
    will-change: transform, opacity;
    filter: drop-shadow(0 0 20px rgba(0,0,0,.8));
  }

  /* 충격선 — 임팩트 순간 사방으로 뻗치는 흰 선 */
  .impact-line {
    position: absolute;
    pointer-events: none;
    z-index: 28;
    background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(255,255,255,.6) 60%, transparent 100%);
    height: 6px;
    transform-origin: 0% 50%;
    will-change: transform, opacity;
  }

  /* 검은 비네트 — 극적 분위기 */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 22;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,.7) 100%);
    opacity: 0;
    will-change: opacity;
  }

  /* 빨간 위험 오버레이 — 빌드업 동안 깜빡임 */
  #red-tint {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 24;
    background: rgba(230,0,38,0);
    transition: background 0.1s;
  }
  #red-tint.warn { background: rgba(230,0,38,.15); }
  #red-tint.hit { background: rgba(230,0,38,.55); }

  /* 줌 펀치 — 임팩트 순간 무대가 살짝 확대됐다가 돌아옴 */
  body.zoom-punch #stage {
    animation: zoomPunch .35s cubic-bezier(.2,.9,.3,1);
  }
  @keyframes zoomPunch {
    0%   { transform: scale(1); }
    20%  { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  /* 히트 스톱 — 모든 애니메이션 일시 정지 */
  body.hit-stop * { animation-play-state: paused !important; }

  /* 글자 가루(파편) — 부서진 글자조각이 사방으로 흩어짐 */
  .dust {
    position: absolute;
    pointer-events: none;
    z-index: 30;
    font-weight: 900;
    font-family: var(--font);
    color: #fff;
    text-shadow: 0 0 8px #ffaa00, 0 0 18px #ff4400, 2px 2px 0 #000;
    will-change: transform, opacity;
    white-space: nowrap;
  }

  /* ============ 흔들림 ============ */
  @keyframes shake {
    0%,100% { transform: translate(0,0) rotate(0); }
    10% { transform: translate(calc(-1 * var(--shake-amp)), calc(0.7 * var(--shake-amp))) rotate(-.5deg); }
    20% { transform: translate(var(--shake-amp), calc(-0.5 * var(--shake-amp))) rotate(.6deg); }
    30% { transform: translate(calc(-0.7 * var(--shake-amp)), calc(-1 * var(--shake-amp))) rotate(-.4deg); }
    40% { transform: translate(calc(0.8 * var(--shake-amp)), calc(0.6 * var(--shake-amp))) rotate(.3deg); }
    50% { transform: translate(calc(-0.6 * var(--shake-amp)), calc(0.8 * var(--shake-amp))) rotate(-.2deg); }
    60% { transform: translate(calc(0.7 * var(--shake-amp)), calc(-0.7 * var(--shake-amp))) rotate(.4deg); }
    70% { transform: translate(calc(-0.8 * var(--shake-amp)), calc(0.4 * var(--shake-amp))) rotate(-.3deg); }
    80% { transform: translate(calc(0.5 * var(--shake-amp)), calc(-0.6 * var(--shake-amp))) rotate(.2deg); }
    90% { transform: translate(calc(-0.3 * var(--shake-amp)), calc(0.3 * var(--shake-amp))) rotate(-.1deg); }
  }
  body.shaking #stage { animation: shake .5s ease-in-out; }

  /* ============ 플래시 ============ */
  #flash {
    position: fixed; inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 50;
  }
  #flash.on { animation: flash .3s ease-out; }
  @keyframes flash {
    0% { opacity: 0; }
    20% { opacity: .9; }
    100% { opacity: 0; }
  }

  /* ============ 파편/이펙트 ============ */
  .shard, .drip, .ring, .ember {
    position: absolute;
    pointer-events: none;
    z-index: 15;
    will-change: transform, opacity;
  }
  .shard {
    width: 8px; height: 8px;
  }
  .drip {
    width: 6px;
    background: linear-gradient(180deg, #8b0000 0%, #4a0000 100%);
    border-radius: 0 0 50% 50%;
    box-shadow: 0 0 10px #4a0000;
  }
  .ring {
    border: 3px solid var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 40px var(--accent), inset 0 0 40px var(--accent);
  }
  .ember {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffff00 0%, #ff6600 50%, transparent 100%);
    box-shadow: 0 0 12px #ff6600;
  }

  /* CRACK */
  .crack {
    position: absolute;
    pointer-events: none;
    z-index: 20;
    width: 300px; height: 300px;
    background:
      radial-gradient(circle, transparent 0%, transparent 4%, rgba(255,255,255,.9) 4.5%, transparent 5%),
      conic-gradient(from 0deg,
        transparent 0deg, rgba(255,255,255,.8) 2deg, transparent 4deg,
        transparent 45deg, rgba(255,255,255,.6) 47deg, transparent 49deg,
        transparent 90deg, rgba(255,255,255,.7) 92deg, transparent 94deg,
        transparent 135deg, rgba(255,255,255,.5) 137deg, transparent 139deg,
        transparent 180deg, rgba(255,255,255,.8) 182deg, transparent 184deg,
        transparent 225deg, rgba(255,255,255,.6) 227deg, transparent 229deg,
        transparent 270deg, rgba(255,255,255,.7) 272deg, transparent 274deg,
        transparent 315deg, rgba(255,255,255,.5) 317deg, transparent 319deg);
    transform: translate(-50%,-50%) rotate(var(--r,0deg));
    animation: crackFade 1.5s forwards;
    mix-blend-mode: screen;
  }
  @keyframes crackFade {
    0% { opacity: 0; transform: translate(-50%,-50%) rotate(var(--r,0deg)) scale(.2); }
    20% { opacity: 1; transform: translate(-50%,-50%) rotate(var(--r,0deg)) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-50%) rotate(var(--r,0deg)) scale(1.4); }
  }

  /* RUNE (저주 배경) */
  .rune {
    position: absolute;
    pointer-events: none;
    font-size: 200px;
    color: rgba(139,0,0,.15);
    z-index: 2;
    font-family: serif;
    animation: runeFade 4s ease-out forwards;
  }
  @keyframes runeFade {
    0% { opacity: 0; transform: scale(0.5) rotate(0); }
    30% { opacity: 1; transform: scale(1) rotate(10deg); }
    100% { opacity: 0; transform: scale(1.5) rotate(20deg); }
  }
</style>
</head>
<body data-theme="curse">
  <div id="stage">
  </div>
  <div id="flash"></div>
  <div id="red-tint"></div>

  <div id="themes">
    <button data-theme="curse" class="active">저주</button>
    <button data-theme="execute">처형</button>
    <button data-theme="rage">격노</button>
    <button data-theme="nuclear">핵폭발</button>
  </div>

  <div id="counter"><span id="count">0</span></div>

  <input id="text" type="text" maxlength="120" autofocus>

<script>
const stage = document.getElementById('stage');
const input = document.getElementById('text');
const flash = document.getElementById('flash');
const countEl = document.getElementById('count');
const themeBtns = document.querySelectorAll('#themes button');

// 고정 디폴트 (UI 제거)
const DEFAULT_SIZE = 160;
const DEFAULT_INTENSITY = 8;

const rand = (a,b) => a + Math.random()*(b-a);
const pick = arr => arr[Math.floor(Math.random()*arr.length)];

let count = 0;
let currentTheme = 'curse';

/* ============ 테마 정의 ============ */
const THEMES = {
  rage: {
    title: '조용한 비명실 · SILENT SCREAM',
    label: '오늘 터진 비명',
    placeholder: '여기에 쏟아내...',
    accent: '#ff1744',
    palette: ['#ff1744','#ff9100','#ffea00','#00e676','#00e5ff','#d500f9','#ff4081','#ffffff'],
    shoutClass: 'glitch',
    detonate(text) {
      const intensity = DEFAULT_INTENSITY;
      const size = DEFAULT_SIZE;
      flashOn();
      shake();
      spawnShout(text, {
        x: innerWidth/2, y: innerHeight/2,
        size, color: this.accent,
        cls: 'glitch', rot: rand(-8,8), dx:0, dy:0,
        endscale: 3, dur: 2.8
      });
      for (let i=0;i<intensity;i++) setTimeout(()=>{
        const a = rand(0,Math.PI*2), d = rand(200,700);
        spawnShout(text, {
          x: innerWidth/2+Math.cos(a)*rand(0,100),
          y: innerHeight/2+Math.sin(a)*rand(0,100),
          size: size*rand(.3,1.1), color: pick(this.palette),
          cls: 'glitch', rot: rand(-45,45),
          dx: Math.cos(a)*d, dy: Math.sin(a)*d,
          endscale: rand(1.5,4), spin: rand(-720,720), dur: rand(1.5,3)
        });
      }, i*30);
      for (let i=0;i<3;i++) spawnCrack(rand(innerWidth*.2,innerWidth*.8), rand(innerHeight*.2,innerHeight*.8));
      for (let i=0;i<40;i++) spawnShard(innerWidth/2, innerHeight/2, this.accent);
    }
  },

  curse: {
    title: '저주의 방 · ROOM OF CURSES',
    label: '걸어둔 저주',
    placeholder: '저주를 새겨라...',
    accent: '#8b0000',
    palette: ['#8b0000','#4a0000','#6a0000','#2a0000'],
    shoutClass: 'tremble',
    detonate(text) {
      const intensity = DEFAULT_INTENSITY;
      const size = DEFAULT_SIZE;
      flashOn();
      shake(0.6);
      spawnRune();
      spawnShout(text, {
        x: innerWidth/2, y: innerHeight/2,
        size, color: '#8b0000', cls: 'tremble', dur: 3
      });
      // 거꾸로/주변 메아리
      for (let i=0;i<intensity;i++) setTimeout(()=>{
        spawnShout(text, {
          x: rand(innerWidth*.1,innerWidth*.9),
          y: rand(innerHeight*.1,innerHeight*.85),
          size: size*rand(.3,.8), color: pick(this.palette),
          cls: 'tremble', dur: rand(2,3.5)
        });
      }, i*150);
      // 핏물 드립
      for (let i=0;i<intensity*2;i++) setTimeout(()=>{
        spawnDrip(rand(0,innerWidth), rand(0, innerHeight*0.3));
      }, i*80);
      // 가끔 추가 룬
      setTimeout(spawnRune, 600);
    }
  },

  execute: {
    title: '처형장 · EXECUTION',
    label: '처형 횟수',
    placeholder: '대상의 이름을 적어라...',
    accent: '#e60026',
    palette: ['#e60026','#8b0000','#a00018','#c00020','#ffffff'],
    shoutClass: 'verdict',
    detonate(text) {
      const cx = innerWidth/2, cy = innerHeight/2;
      const chars = Array.from(text);
      const perChar = 110; // 한 글자당 ms
      const typeDur = chars.length * perChar;

      // 작은 "처형." 라벨 (대상 위)
      const label = document.createElement('div');
      label.style.cssText = `position:absolute;left:${cx}px;top:${cy - 130}px;transform:translate(-50%,-50%);font-family:var(--font);font-size:22px;color:#e60026;letter-spacing:6px;z-index:30;text-shadow:0 0 8px #8b0000,2px 2px 0 #000;opacity:0;transition:opacity .25s;`;
      label.textContent = '처형.';
      stage.appendChild(label);
      requestAnimationFrame(()=>{ label.style.opacity = '1'; });

      // 대상 이름 컨테이너 (한 글자씩 채워짐)
      const target = document.createElement('div');
      target.style.cssText = `position:absolute;left:${cx}px;top:${cy + 10}px;transform:translate(-50%,-50%);font-family:var(--font);font-size:200px;color:#fff;font-weight:900;font-style:italic;z-index:30;letter-spacing:-2px;white-space:nowrap;text-shadow:0 0 12px #e60026,0 0 30px #8b0000,4px 4px 0 #000,-4px -4px 0 #000;-webkit-text-stroke:2px #e60026;`;
      target.textContent = '';
      stage.appendChild(target);

      // 한 글자씩 등장 + 미세 흔들림
      chars.forEach((ch, i)=>{
        setTimeout(()=>{
          target.textContent += ch;
          shake(0.15);
        }, i * perChar);
      });

      // 타이핑 후 잠깐 락온 → 무기 진입 → 임팩트
      const lockHold = 250;
      const weaponDur = 800;
      const impactAt = typeDur + lockHold + weaponDur;

      // 무기 진입
      const weapon = pick(WEAPONS);
      setTimeout(()=>{
        spawnWeaponSwing(weapon, weaponDur);
        shake(0.5);
        setTimeout(()=>shake(0.8), weaponDur*0.4);
      }, typeDur + lockHold);

      // ███ IMPACT ███
      setTimeout(()=>{
        // 표적/라벨 즉시 제거 — 산산조각으로 대체
        target.remove();
        label.remove();

        flashOn();
        redHit();
        zoomPunch();
        shake(2);
        spawnImpactLines(cx, cy + 10, 24);
        spawnBloodSplatter(cx, cy + 10, 60);
        spawnShatter(text);
        hitStop(120);
      }, impactAt);
    }
  },

  nuclear: {
    title: '핵폭발 · NUCLEAR DETONATION',
    label: '터뜨린 폭탄',
    placeholder: '기폭하라...',
    accent: '#ffaa00',
    palette: ['#ffffff','#ffea00','#ff9100','#ff1744','#ff6600'],
    shoutClass: 'engulf',
    detonate(text) {
      // 작은 점에서 시작 → 점점 커지며 화면 꽉 채우고 → 와장창 깨져 가루로 흩어짐
      spawnShout(text, {
        x: innerWidth/2, y: innerHeight/2,
        size: 80, color: '#fff', cls: 'engulf', dur: 5
      });
      // 빌드업 흔들림
      shake(0.2);
      setTimeout(()=>shake(0.5), 1500);
      setTimeout(()=>shake(0.9), 3000);
      // 4.6s 직전: 글자가 산산조각 나며 가루로 흩어짐
      setTimeout(()=>{
        flashOn();
        setTimeout(flashOn, 80);
        shake(1.5);
        for (let i=0;i<6;i++) setTimeout(()=>spawnRing(innerWidth/2,innerHeight/2), i*90);
        for (let i=0;i<60;i++) spawnEmber(innerWidth/2, innerHeight/2);
        spawnShatter(text);
      }, 4750);
    }
  }
};

/* ============ 헬퍼 ============ */
function flashOn() {
  flash.classList.remove('on');
  void flash.offsetWidth;
  flash.classList.add('on');
}
function shake(mult=1) {
  document.body.classList.remove('shaking');
  void document.body.offsetWidth;
  document.documentElement.style.setProperty('--shake-amp',
    (parseFloat(getComputedStyle(document.body).getPropertyValue('--shake-amp'))*mult)+'px');
  document.body.classList.add('shaking');
  setTimeout(()=>document.body.classList.remove('shaking'), 600);
}

function spawnShout(text, opt) {
  const el = document.createElement('div');
  el.className = 'shout ' + (opt.cls || '');
  el.textContent = text;
  el.style.left = opt.x + 'px';
  el.style.top = opt.y + 'px';
  el.style.fontSize = opt.size + 'px';
  if (opt.color) el.style.color = opt.color;
  el.style.setProperty('--rot', (opt.rot||0) + 'deg');
  el.style.setProperty('--dx', (opt.dx||0) + 'px');
  el.style.setProperty('--dy', (opt.dy||0) + 'px');
  el.style.setProperty('--endscale', opt.endscale||3);
  el.style.setProperty('--spin', (opt.spin||180) + 'deg');
  el.style.setProperty('--dur', (opt.dur||2.5) + 's');
  stage.appendChild(el);
  setTimeout(()=>el.remove(), (opt.dur||2.5)*1000+200);
}

// 무기 휘두르기 — 화면 밖에서 회전하며 날아와 중앙을 강타

  const angle = rand(0, Math.PI*2);

// 글자가 와장창 깨지면서 가루가 되어 흩어짐
// text를 자모/글자 단위로 쪼개서 화면 가득 채운 사이즈로 흩뿌림
function spawnShatter(text) {
  const cx = innerWidth/2, cy = innerHeight/2;
  const chars = Array.from(text);
  // 글자 수가 적으면 반복해서 가루 양을 늘림
  const reps = Math.max(1, Math.ceil(80 / Math.max(1, chars.length)));
  const all = [];
  for (let r=0;r<reps;r++) for (const ch of chars) all.push(ch);

  // 큰 덩어리(원본 크기 잔해) — 빠르게 사라짐
  for (let i=0;i<14;i++) {
    spawnDustChunk(pick(chars), cx + rand(-200,200), cy + rand(-150,150), rand(60,160));
  }
  // 가루 — 작은 글자들이 사방 + 약한 중력으로 흩어짐
  for (let i=0;i<all.length;i++) {
    spawnDustChunk(all[i], cx + rand(-300,300), cy + rand(-200,200), rand(10,40));
  }
}

function spawnDustChunk(ch, x, y, size) {
  const el = document.createElement('div');
  el.className = 'dust';
  el.textContent = ch;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.fontSize = size + 'px';
  el.style.transform = 'translate(-50%,-50%)';
  stage.appendChild(el);

  const a = rand(0, Math.PI*2);
  const speed = rand(400, 1500);
  const dx = Math.cos(a) * speed;
  const dy = Math.sin(a) * speed;
  const gravity = rand(300, 900);
  const dur = rand(1200, 2400);
  const spin = rand(-1080, 1080);

  el.animate([
    { transform: 'translate(-50%,-50%) rotate(0deg)', opacity: 1, filter: 'blur(0)' },
    { transform: `translate(calc(-50% + ${dx*0.5}px), calc(-50% + ${dy*0.5 + gravity*0.15}px)) rotate(${spin*0.5}deg)`, opacity: 1, offset: 0.5 },
    { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy + gravity}px)) rotate(${spin}deg)`, opacity: 0, filter: 'blur(4px)' }
  ], { duration: dur, easing: 'cubic-bezier(.2,.6,.4,1)' });
  setTimeout(()=>el.remove(), dur);
}

/* ============ 5초 드라마틱 브로드캐스트 ============ */
// 다른 사용자(혹은 본인)가 서버를 거쳐 들어온 외침은 5초간 다단계 연출로 표현
function broadcastDetonate(text) {
  const cx = innerWidth/2, cy = innerHeight/2;
  const t = THEMES[currentTheme];
  const palette = t.palette;
  const accent = t.accent;

  // ── PHASE 0 (0.0s) : 빨려 들어오며 등장
  flashOn();
  shake(0.8);
  spawnShout(text, {
    x: cx, y: cy, size: 240, color: '#fff',
    cls: 'glitch', rot: 0, dx:0, dy:0, endscale: 1.2, spin: 0, dur: 0.7
  });

  // ── PHASE 1 (0.4s) : RGB 글리치 분열 (3겹 오프셋)
  setTimeout(()=>{
    const offsets = [
      { c:'#ff003c', dx:-10 },
      { c:'#00fff0', dx:10 },
      { c:'#ffffff', dx:0 }
    ];
    offsets.forEach(o=>{
      spawnShout(text, {
        x: cx + o.dx, y: cy, size: 220, color: o.c,
        cls: 'glitch', rot: rand(-2,2), dx:0, dy:0,
        endscale: 1, spin: 0, dur: 0.9
      });
    });
    shake(0.5);
  }, 400);

  // ── PHASE 2 (1.0s) : 사방에서 날아옴 (4면 + 4코너)
  setTimeout(()=>{
    flashOn();
    const sides = [
      { x:-200, y:cy }, { x:innerWidth+200, y:cy },
      { x:cx, y:-200 }, { x:cx, y:innerHeight+200 },
      { x:-200, y:-200 }, { x:innerWidth+200, y:-200 },
      { x:-200, y:innerHeight+200 }, { x:innerWidth+200, y:innerHeight+200 }
    ];
    sides.forEach(s=>{
      spawnShout(text, {
        x: s.x, y: s.y, size: rand(100,180),
        color: pick(palette), cls: 'glitch',
        rot: rand(-25,25),
        dx: cx - s.x + rand(-80,80),
        dy: cy - s.y + rand(-80,80),
        endscale: rand(0.4, 1.2), spin: rand(-360,360), dur: 1.1
      });
    });
  }, 1000);

  // ── PHASE 3 (1.8s) : 폰트 사이즈가 들쭉날쭉 무작위 등장
  setTimeout(()=>{
    for (let i=0;i<14;i++) setTimeout(()=>{
      spawnShout(text, {
        x: rand(0, innerWidth), y: rand(0, innerHeight),
        size: rand(40, 260), color: pick(palette),
        cls: 'glitch', rot: rand(-40,40),
        dx: rand(-180,180), dy: rand(-180,180),
        endscale: rand(0.8, 3), spin: rand(-540,540), dur: rand(0.9, 1.4)
      });
    }, i*45);
  }, 1800);

  // ── PHASE 4 (2.8s) : 좌→우 / 우→좌 흐르는 트레일
  setTimeout(()=>{
    const dir = Math.random() > 0.5 ? 1 : -1;
    for (let i=0;i<12;i++) setTimeout(()=>{
      const startX = dir > 0 ? -150 : innerWidth+150;
      const sy = rand(innerHeight*0.15, innerHeight*0.85);
      spawnShout(text, {
        x: startX, y: sy, size: rand(60, 160),
        color: pick(palette), cls: 'glitch',
        rot: rand(-10,10),
        dx: dir * (innerWidth + 300),
        dy: rand(-60,60),
        endscale: rand(1, 1.8), spin: 0, dur: 1.0
      });
    }, i*45);
    shake(0.4);
  }, 2800);

  // ── PHASE 5 (3.8s) : 화면 깨짐 + 최후의 폭발
  setTimeout(()=>{
    flashOn();
    shake(1.2);
    // 거대 중앙
    spawnShout(text, {
      x: cx, y: cy, size: 320, color: '#fff',
      cls: 'glitch', rot: 0, dx:0, dy:0,
      endscale: 5, spin: 360, dur: 1.2
    });
    // 사방 폭발
    for (let i=0;i<24;i++) {
      const a = (i/24) * Math.PI*2;
      spawnShout(text, {
        x: cx, y: cy, size: rand(40, 140),
        color: pick(palette), cls: 'glitch',
        rot: rand(-180,180),
        dx: Math.cos(a) * rand(500, 1100),
        dy: Math.sin(a) * rand(500, 1100),
        endscale: rand(0.6, 2.5), spin: rand(-720,720), dur: 1.2
      });
    }
    // 크랙 + 파편
    for (let i=0;i<5;i++) spawnCrack(
      rand(innerWidth*0.15, innerWidth*0.85),
      rand(innerHeight*0.15, innerHeight*0.85)
    );
    for (let i=0;i<70;i++) spawnShard(cx, cy, pick(palette));
  }, 3800);
}

/* ============ 수신 큐 (산발적 표시) ============ */
const incomingQueue = [];
let queueRunning = false;
function enqueueIncoming(text) {
  incomingQueue.push(text);
  if (!queueRunning) drainQueue();
}
function drainQueue() {
  if (incomingQueue.length === 0) { queueRunning = false; return; }
  queueRunning = true;
  const text = incomingQueue.shift();
  broadcastDetonate(text);
  count++;
  countEl.textContent = count;
  // 다음 외침은 0.6~2.0초 사이 랜덤 딜레이로 — 산발적 느낌
  const next = rand(600, 2000);
  setTimeout(drainQueue, next);
}

/* ============ SSE 연결 (테마=방) ============ */
let seenIds = new Set();
let sinceTs = Date.now();
let es = null;
let streamRoom = null;
let reconnectTimer = null;

function connectStream() {
  try { if (es) es.close(); } catch {}
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  streamRoom = currentTheme;
  es = new EventSource(`/api/stream?room=${streamRoom}&since=${sinceTs}`);
  es.onmessage = (e) => {
    try {
      const obj = JSON.parse(e.data);
      if (!obj || !obj.id || seenIds.has(obj.id)) return;
      // 방이 바뀌었으면 무시
      if (obj.room && obj.room !== currentTheme) return;
      seenIds.add(obj.id);
      if (typeof obj.ts === 'number' && obj.ts > sinceTs) sinceTs = obj.ts;
      enqueueIncoming(obj.text);
    } catch {}
  };
  es.onerror = () => {
    try { es.close(); } catch {}
    reconnectTimer = setTimeout(connectStream, 2000);
  };
}

function switchRoom() {
  // 방 전환 시 큐/seen 초기화 + 새 방으로 SSE 재연결
  incomingQueue.length = 0;
  queueRunning = false;
  seenIds = new Set();
  sinceTs = Date.now();
  connectStream();
}

connectStream();

/* ============ 메인 ============ */
async function go() {
  let text = input.value.trim();
  if (!text) text = pick(['!!!','AAAAH','XXXX','...','으아아악']);
  input.value = '';
  input.focus();

  // 로컬 즉각 피드백 (테마별 이펙트)
  THEMES[currentTheme].detonate(text);
  count++;
  countEl.textContent = count;

  // 서버로 전송 (실패해도 무시 — 로컬은 이미 떴음)
  try {
    const res = await fetch('/api/shout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, room: currentTheme })
    });
    if (res.ok) {
      const data = await res.json();
      // 자기 자신이 SSE로 다시 받아서 5초 연출 또 트는 걸 막음
      if (data && data.id) seenIds.add(data.id);
    }
  } catch (e) {
    // offline / no api — 무시
  }
}

function setTheme(name) {
  currentTheme = name;
  document.body.dataset.theme = name;
  const t = THEMES[name];
  themeBtns.forEach(b => b.classList.toggle('active', b.dataset.theme===name));
  if (typeof switchRoom === 'function') switchRoom();
}

themeBtns.forEach(b => b.addEventListener('click', ()=>setTheme(b.dataset.theme)));
input.addEventListener('keydown', e => { if (e.key==='Enter') go(); });
